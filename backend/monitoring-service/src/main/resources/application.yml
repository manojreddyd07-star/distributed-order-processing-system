spring:
  application:
    name: monitoring-service
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/monitoringdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: MonitoringServiceHikariCP
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        # Enable batch processing
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    open-in-view: false
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: monitoring-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"

server:
  port: ${SERVER_PORT:8086}

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,env,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    kafka:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    enable:
      jvm: true
      system: true
      http: true
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s

# Monitoring Configuration
monitoring:
  services:
    order-service:
      url: ${ORDER_SERVICE_URL:http://localhost:8081}
      health-endpoint: /actuator/health
    validation-service:
      url: ${VALIDATION_SERVICE_URL:http://localhost:8082}
      health-endpoint: /actuator/health
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
      health-endpoint: /actuator/health
    inventory-service:
      url: ${INVENTORY_SERVICE_URL:http://localhost:8084}
      health-endpoint: /actuator/health
    fulfillment-service:
      url: ${FULFILLMENT_SERVICE_URL:http://localhost:8085}
      health-endpoint: /actuator/health
  refresh-interval: 30000 # 30 seconds

logging:
  level:
    com.project.monitoring: INFO
    org.springframework.kafka: INFO
    org.springframework.web: INFO
